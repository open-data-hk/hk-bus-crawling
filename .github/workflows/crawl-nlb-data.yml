name: Crawl NLB Data
on:
  schedule:
    - cron: "12 20 * * *" # 04:12 (HKT) daily
  workflow_dispatch:

jobs:
  Crawl-NLB-Data:
    runs-on: ubuntu-latest

    env:
      AWS_ENDPOINT_URL: ${{ secrets.AWS_ENDPOINT_URL }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Install poetry
        run: pipx install poetry

      - name: Setup Python environment
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          architecture: 'x64'
          cache: 'poetry'

      - name: Install dependencies
        run: poetry install

      - name: Crawl NLB raw data
        env:
          REQUEST_LIMIT: "6"
        run: poetry run python ./crawling/nlb_crawl.py --force

      - name: Upload NLB raw data to S3
        run: |
          aws s3 cp data/nlb.raw.routeList.json s3://${{ secrets.AWS_S3_BUCKET }}/transport/nlb/nlb.raw.routeList.json
          aws s3 cp data/nlb.raw.routeStopList.json s3://${{ secrets.AWS_S3_BUCKET }}/transport/nlb/nlb.raw.routeStopList.json
          aws s3 cp data/nlb.raw.stopList.json s3://${{ secrets.AWS_S3_BUCKET }}/transport/nlb/nlb.raw.stopList.json

      - name: Archive NLB raw data
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: NLB Raw Files
          retention-days: 14
          path: |
            data/nlb.raw.routeList.json
            data/nlb.raw.routeStopList.json
            data/nlb.raw.stopList.json
